<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crystal VPN — Правовые документы</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.2.0/github-markdown-dark.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root{
      /* поверхности — единый бренд Crystal */
      --bg:#0a0e16; --surface:#121826; --surface-2:#161d2e;
      --border:rgba(255,255,255,.08); --line-2:rgba(255,255,255,.13);
      --text:#eaf0fb; --muted:#8a96ad;
      /* бренд: преломление циан → фиолет */
      --c1:#29d3f0; --c2:#6e5bff;
      --accent:#29d3f0; --accent-soft:rgba(41,211,240,.12);
      --grad:linear-gradient(135deg, var(--c1), var(--c2));
      --glow-1:rgba(41,211,240,.45); --glow-2:rgba(110,91,255,.42);
      /* форма / тайминги */
      --radius:14px;
      --ease:cubic-bezier(.22,.61,.36,1);
      --spring:cubic-bezier(.34,1.56,.64,1);
    }
    *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
    html{scroll-behavior:smooth}
    body{
      margin:0; background:var(--bg); color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,Helvetica,Arial,sans-serif;
      -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility; line-height:1.5;
    }
    /* амбиентное свечение — фиксированный композ-слой, без репейнта на скролле */
    body::before{
      content:""; position:fixed; inset:0; z-index:-1; pointer-events:none;
      background:
        radial-gradient(900px 480px at 50% -10%, rgba(41,211,240,.10), transparent 60%),
        radial-gradient(820px 560px at 90% 112%, rgba(110,91,255,.12), transparent 62%);
    }

    /* ── Полоса прогресса чтения (только transform) ─────────── */
    .progress{position:fixed; top:0; left:0; right:0; height:3px; background:rgba(255,255,255,.045); z-index:100}
    .progress__fill{
      height:100%; width:100%; background:var(--grad);
      transform-origin:0 50%; transform:scaleX(0);
      box-shadow:0 0 12px var(--glow-1); will-change:transform;
    }

    .wrap{max-width:860px;margin:0 auto;padding:30px 20px 72px}

    /* ── Кристалл (единый знак бренда) ──────────────────────── */
    .crystal{position:relative; display:inline-grid; place-items:center; width:30px; height:30px; flex:none;
      filter:drop-shadow(0 6px 14px rgba(41,211,240,.32))}
    .crystal svg{width:100%; height:100%; display:block}
    .crystal__sheen{
      position:absolute; inset:0; pointer-events:none;
      clip-path:polygon(31.25% 15.6%, 68.75% 15.6%, 87.5% 40.6%, 50% 93.75%, 12.5% 40.6%);
      background:linear-gradient(115deg, transparent 42%, rgba(255,255,255,.6) 50%, transparent 58%);
      transform:translateX(-130%); opacity:0;
    }
    @media (prefers-reduced-motion:no-preference){
      .crystal__sheen{animation:sheen 5.5s var(--ease) infinite}
    }
    @keyframes sheen{
      0%{transform:translateX(-130%); opacity:0}
      60%{transform:translateX(-130%); opacity:0}
      68%{opacity:1}
      100%{transform:translateX(130%); opacity:0}
    }

    /* ── Шапка ──────────────────────────────────────────────── */
    header.brand{margin-bottom:22px; opacity:0; transform:translateY(10px); animation:rise .55s var(--ease) .04s both}
    @keyframes rise{from{opacity:0; transform:translateY(12px)}to{opacity:1; transform:none}}
    .eyebrow{
      font-size:11px; letter-spacing:.18em; text-transform:uppercase;
      color:var(--muted); font-weight:600; margin-bottom:8px;
    }
    .title{display:flex; align-items:center; gap:11px; font-size:26px; font-weight:700; letter-spacing:-.01em}
    .reqs{
      margin-top:16px; display:flex; flex-wrap:wrap; gap:6px 14px;
      font-size:12.5px; color:var(--muted);
      padding:11px 15px; background:var(--surface); border:1px solid var(--border); border-radius:12px;
      transition:transform .25s var(--ease), border-color .25s var(--ease);
    }
    .reqs:hover{transform:translateY(-1px); border-color:var(--line-2)}
    .reqs b{color:var(--text); font-weight:600}
    .reqs .dot{color:var(--border)}

    /* ── Контролы ───────────────────────────────────────────── */
    .controls{
      display:flex; flex-wrap:wrap; gap:12px; justify-content:space-between; align-items:center;
      margin:24px 0 16px; opacity:0; transform:translateY(10px); animation:rise .55s var(--ease) .12s both;
    }
    .tabs-wrap{position:relative; min-width:0}
    .tabs{display:flex; flex-wrap:wrap; gap:8px}

    /* скользящая «капля» под активной вкладкой (iOS-segmented) */
    .tab-ink{
      position:absolute; left:0; top:0; width:0; height:0; z-index:0;
      border-radius:999px; background:var(--grad); opacity:0;
      box-shadow:0 10px 24px -10px var(--glow-2), 0 6px 16px -8px var(--glow-1);
      transform:translate(0,0); will-change:transform, width;
      transition:transform .42s var(--spring), width .42s var(--spring), height .2s var(--ease), opacity .2s var(--ease);
    }

    .tabs button,.langs button{
      position:relative; z-index:1; font:inherit; font-size:13.5px; font-weight:600; cursor:pointer;
      background:var(--surface-2); color:var(--muted);
      border:1px solid var(--border); border-radius:999px; padding:8px 15px;
      transition:transform .18s var(--ease), color .18s var(--ease), border-color .18s var(--ease);
    }
    .tabs button::after{
      content:""; position:absolute; inset:0; z-index:-1; border-radius:inherit;
      box-shadow:0 10px 22px -8px var(--glow-2); opacity:0; transition:opacity .2s var(--ease);
    }
    .tabs button:hover:not(.active){transform:translateY(-1px); color:var(--text); border-color:var(--line-2)}
    .tabs button:hover:not(.active)::after{opacity:.7}
    .tabs button:active{transform:translateY(0) scale(.98)}
    .tabs button.active{background:transparent; border-color:transparent; color:#04181c; font-weight:700}

    .langs{display:flex; gap:6px}
    .langs button{padding:7px 12px; font-size:12.5px}
    .langs button:hover:not(.active){transform:translateY(-1px); color:var(--text); border-color:var(--line-2)}
    .langs button:active{transform:translateY(0) scale(.97)}
    .langs button.active{
      color:#cdeffb; border-color:color-mix(in srgb, var(--c1) 55%, transparent);
      background:color-mix(in srgb, var(--c1) 14%, transparent);
    }
    :focus-visible{outline:2px solid var(--accent); outline-offset:2px}

    /* ── Контент ────────────────────────────────────────────── */
    .markdown-body{
      background:var(--surface); border:1px solid var(--border);
      border-radius:var(--radius); padding:32px; min-height:240px;
    }
    .markdown-body a{color:var(--accent); text-decoration:none !important; position:relative}
    .markdown-body h1{border-bottom-color:var(--border)}
    .markdown-body h2{border-bottom-color:var(--border); margin-top:1.6em}
    .markdown-body blockquote{border-left-color:var(--accent); color:var(--muted)}
    .markdown-body table tr{background:transparent}
    .markdown-body table td,.markdown-body table th{border-color:var(--border)}
    .state{color:var(--muted); padding:20px 0; text-align:center}

    /* подчёркивание-«линия» у ссылок (только transform) */
    .reqs a,footer a{color:var(--accent); text-decoration:none; position:relative}
    .reqs a::after,footer a::after,.markdown-body a::after{
      content:""; position:absolute; left:0; right:0; bottom:-1px; height:1px;
      background:currentColor; opacity:.85;
      transform:scaleX(0); transform-origin:0 50%; transition:transform .28s var(--ease);
    }
    .reqs a:hover::after,footer a:hover::after,.markdown-body a:hover::after{transform:scaleX(1)}

    /* появление блоков документа по скроллу (мягко, чтобы не мешать чтению) */
    .reveal{opacity:0; transform:translateY(10px); transition:opacity .5s var(--ease), transform .5s var(--ease)}
    .reveal.in{opacity:1; transform:none}

    footer{margin-top:26px; padding-top:16px; border-top:1px solid var(--border);
      font-size:12px; color:var(--muted); display:flex; flex-wrap:wrap; gap:6px 14px; justify-content:space-between}

    @media (max-width:600px){
      .wrap{padding:22px 14px 56px}
      .title{font-size:22px}
      .markdown-body{padding:20px}
      .controls{flex-direction:column; align-items:stretch}
      .langs{justify-content:flex-start}
    }
    @media (prefers-reduced-motion:reduce){
      html{scroll-behavior:auto}
      .crystal__sheen{display:none}
      header.brand,.controls{animation:none; opacity:1; transform:none}
      .reveal{opacity:1 !important; transform:none !important; transition:none !important}
      .tab-ink{transition:none !important}
    }
  </style>
</head>
<body>
  <!-- Единый кристалл бренда -->
  <svg width="0" height="0" style="position:absolute" aria-hidden="true">
    <defs>
      <linearGradient id="cg" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0" stop-color="#29d3f0"/><stop offset="1" stop-color="#6e5bff"/>
      </linearGradient>
      <symbol id="crystal-sym" viewBox="0 0 32 32">
        <path d="M10 5 L22 5 L28 13 L16 30 L4 13 Z" fill="url(#cg)"/>
        <path d="M10 5 L22 5 L20 13 L12 13 Z" fill="#fff" opacity=".22"/>
        <path d="M10 5 L12 13 L4 13 Z" fill="#000" opacity=".18"/>
        <path d="M22 5 L28 13 L20 13 Z" fill="#fff" opacity=".10"/>
        <path d="M4 13 L12 13 L16 30 Z" fill="#000" opacity=".22"/>
        <path d="M12 13 L20 13 L16 30 Z" fill="#fff" opacity=".10"/>
        <path d="M20 13 L28 13 L16 30 Z" fill="#000" opacity=".12"/>
        <path d="M4 13 L10 5 L22 5" stroke="#fff" stroke-opacity=".5" stroke-width=".7" stroke-linejoin="round" fill="none"/>
      </symbol>
    </defs>
  </svg>

  <div class="progress"><div class="progress__fill" id="progressFill"></div></div>

  <div class="wrap">
    <header class="brand">
      <div class="eyebrow" id="eyebrow">Официальные документы</div>
      <div class="title"><span class="crystal"><svg><use href="#crystal-sym"/></svg><i class="crystal__sheen"></i></span>Crystal VPN</div>
      <div class="reqs">
        <span><b id="r-self">Самозанятый</b> Нгуен За Бао</span><span class="dot">·</span>
        <span><b>ИНН</b> 504109403841</span><span class="dot">·</span>
        <span><b id="r-sup">Поддержка</b> <a href="https://t.me/bao_gigastore">@bao_gigastore</a></span>
      </div>
    </header>

    <div class="controls">
      <div class="tabs-wrap">
        <span class="tab-ink" aria-hidden="true"></span>
        <div class="tabs" id="tabs"></div>
      </div>
      <div class="langs" id="langs">
        <button data-lang="ru" class="active">RU</button>
        <button data-lang="en">EN</button>
        <button data-lang="vi">VI</button>
      </div>
    </div>

    <main id="content" class="markdown-body"><div class="state" id="state">Загрузка…</div></main>

    <footer>
      <span><a href="https://t.me/Crysta1_VPNbot">@Crysta1_VPNbot</a> · zabaonguen03@gmail.com</span>
      <span id="updated">Редакция 1.1 · 20.06.2026</span>
    </footer>
  </div>

  <script>
    // Документ → файл по языку. Достаточно положить .md рядом с index.html.
    const DOCS = {
      offer:   { ru:'OFFER.md',            en:'OFFER_EN.md',            vi:'OFFER_VI.md'            },
      privacy: { ru:'PRIVACY.md',          en:'PRIVACY_EN.md',          vi:'PRIVACY_VI.md'          },
      partner: { ru:'REFERRAL_PROGRAM.md', en:'REFERRAL_PROGRAM_EN.md', vi:'REFERRAL_PROGRAM_VI.md' },
      terms:   { ru:'TERMS_REFERRAL.md',   en:'TERMS_REFERRAL_EN.md',   vi:'TERMS_REFERRAL_VI.md'   },
    };
    const ORDER = ['offer','privacy','partner','terms'];
    const TAB_LABELS = {
      offer:   { ru:'📜 Оферта',            en:'📜 Offer',         vi:'📜 Điều khoản'   },
      privacy: { ru:'🔐 Конфиденциальность', en:'🔐 Privacy',       vi:'🔐 Bảo mật'      },
      partner: { ru:'🤝 Партнёрка',          en:'🤝 Partners',      vi:'🤝 Đối tác'      },
      terms:   { ru:'📋 Правила партнёрки',  en:'📋 Partner rules', vi:'📋 Quy tắc'      },
    };
    const UI = {
      ru:{eyebrow:'Официальные документы',loading:'Загрузка…',error:'Не удалось загрузить документ',self:'Самозанятый',sup:'Поддержка',updated:'Редакция 1.1 · 20.06.2026'},
      en:{eyebrow:'Official documents',loading:'Loading…',error:'Failed to load document',self:'Self-employed',sup:'Support',updated:'Version 1.1 · 2026-06-20'},
      vi:{eyebrow:'Tài liệu chính thức',loading:'Đang tải…',error:'Không tải được tài liệu',self:'Người tự kinh doanh',sup:'Hỗ trợ',updated:'Phiên bản 1.1 · 20.06.2026'},
    };

    // Язык: приоритет ?lang= в URL (deep-link из бота) → localStorage → 'ru'.
    function initialLang(){
      const p = new URLSearchParams(location.search).get('lang');
      if (['ru','en','vi'].includes(p)){ localStorage.setItem('cvpn_lang', p); return p; }
      const ls = localStorage.getItem('cvpn_lang');
      return ['ru','en','vi'].includes(ls) ? ls : 'ru';
    }
    // Держим ?lang= в адресной строке в актуальном состоянии (чтобы reload
    // не сбрасывал выбор языка на дефолтный).
    function syncLangInUrl(l){
      const u = new URL(location.href);
      if (l === 'ru') u.searchParams.delete('lang'); else u.searchParams.set('lang', l);
      history.replaceState(null, '', u.toString());
    }

    let doc = (location.hash.replace('#','') in DOCS) ? location.hash.replace('#','') : 'offer';
    let lang = initialLang();

    const $ = id => document.getElementById(id);
    const REDUCE = !!(window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches);

    function renderTabs(){
      $('tabs').innerHTML = '';
      ORDER.forEach(key=>{
        const b = document.createElement('button');
        b.textContent = TAB_LABELS[key][lang];
        b.className = key===doc ? 'active' : '';
        b.onclick = ()=>{ doc=key; location.hash = key; load(); };
        $('tabs').appendChild(b);
      });
      moveInk();
    }
    function renderChrome(){
      document.documentElement.lang = lang;
      $('eyebrow').textContent = UI[lang].eyebrow;
      $('r-self').textContent = UI[lang].self;
      $('r-sup').textContent = UI[lang].sup;
      $('updated').textContent = UI[lang].updated;
      [...$('langs').children].forEach(b=>b.classList.toggle('active', b.dataset.lang===lang));
    }
    async function load(){
      renderTabs(); renderChrome();
      $('content').innerHTML = `<div class="state">${UI[lang].loading}</div>`;
      const file = DOCS[doc][lang];
      try{
        const res = await fetch(file, {cache:'no-cache'});
        if(!res.ok) throw 0;
        const md = await res.text();
        $('content').innerHTML = marked.parse(md);
        revealContent();
      }catch(e){
        $('content').innerHTML = `<div class="state">${UI[lang].error}: <code>${file}</code></div>`;
      }
    }

    // ── Скользящая «капля» под активной вкладкой ────────────────────────
    // Слайд = transform (GPU), подгон ширины = width (разовая смена по тапу).
    // Угол/перенос строк отрабатывается через offsetTop. Капля живёт вне
    // #tabs, поэтому переживает перерисовку вкладок и плавно перетекает.
    function moveInk(animate){
      const tabs = $('tabs');
      const wrap = tabs.parentElement;
      let ink = wrap.querySelector('.tab-ink');
      if(!ink){
        ink = document.createElement('span');
        ink.className = 'tab-ink'; ink.setAttribute('aria-hidden','true');
        wrap.insertBefore(ink, tabs);
      }
      const active = tabs.querySelector('button.active');
      if(!active){ ink.style.opacity = '0'; return; }
      const x = active.offsetLeft, y = active.offsetTop,
            w = active.offsetWidth, h = active.offsetHeight;
      const place = ()=>{
        ink.style.width = w + 'px'; ink.style.height = h + 'px';
        ink.style.transform = 'translate(' + x + 'px,' + y + 'px)';
        ink.style.opacity = '1';
      };
      if(animate === false || ink.dataset.ready !== '1'){
        const prev = ink.style.transition;
        ink.style.transition = 'none';
        place(); void ink.offsetWidth;     // форсируем reflow, чтобы не было слайда из 0,0
        ink.style.transition = prev;
        ink.dataset.ready = '1';
      } else {
        place();
      }
    }

    // ── Появление блоков документа по мере прокрутки ────────────────────
    let io = null;
    function revealContent(){
      const root = $('content');
      const items = [...root.children].filter(el => el.nodeType === 1 && !el.classList.contains('state'));
      if(!items.length) return;
      if(io){ io.disconnect(); io = null; }
      if(REDUCE || !('IntersectionObserver' in window)){ return; } // контент остаётся видимым
      io = new IntersectionObserver((entries)=>{
        entries.forEach(entry=>{
          if(entry.isIntersecting){ entry.target.classList.add('in'); io.unobserve(entry.target); }
        });
      }, { threshold:0.12, rootMargin:'0px 0px -8% 0px' });
      items.forEach((el,i)=>{
        el.classList.add('reveal');
        el.style.transitionDelay = (Math.min(i,6) * 40) + 'ms';
        io.observe(el);
      });
    }

    // ── Полоса прогресса чтения ─────────────────────────────────────────
    const progressFill = $('progressFill');
    let ticking = false;
    function updateProgress(){
      ticking = false;
      const h = document.documentElement;
      const max = h.scrollHeight - h.clientHeight;
      const p = max > 0 ? (h.scrollTop || document.body.scrollTop) / max : 0;
      progressFill.style.transform = 'scaleX(' + Math.max(0, Math.min(1, p)) + ')';
    }
    window.addEventListener('scroll', ()=>{ if(!ticking){ ticking = true; requestAnimationFrame(updateProgress); } }, {passive:true});
    window.addEventListener('resize', ()=>{ requestAnimationFrame(()=>{ updateProgress(); moveInk(false); }); }, {passive:true});

    [...$('langs').children].forEach(b=>{
      b.onclick = ()=>{ lang=b.dataset.lang; localStorage.setItem('cvpn_lang',lang); syncLangInUrl(lang); load(); };
    });
    window.addEventListener('hashchange', ()=>{
      const h = location.hash.replace('#','');
      if(h in DOCS && h!==doc){ doc=h; load(); }
    });
    load();
    updateProgress();
  </script>
</body>
</html>
