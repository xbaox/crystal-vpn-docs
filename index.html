<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Crystal VPN — Правовые документы</title>

<!--
  Боевая страница Crystal VPN docs (GitHub Pages, репозиторий crystal-vpn-docs).
  Чистый HTML/CSS/JS, без сборки и без бэкенда — кладётся в crystal-vpn-docs/index.html.
  Анимация: гранёный кристалл (page-load оркестрация, парение, световой свип,
  искры, аврора-фон, parallax по курсору), плавная смена вкладок/языка,
  scroll-reveal. Всё уважает prefers-reduced-motion.

  Документы грузятся реальными .md из соседних файлов репозитория (см. DOCS
  ниже и fetch() в load()). Всё уважает prefers-reduced-motion.
-->

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js"></script>

<style>
:root{
  --bg:#0a0e15; --bg-2:#0c111b; --surface:#121b28; --surface-2:#16202e;
  --border:#23344a; --border-2:#2b3e57;
  --text:#eef4fb; --body:#c4d2e0; --muted:#7e93a8;
  --accent:#3da5ff; --accent-light:#7cc4ff; --accent-deep:#2f86d6;
  --ink:#04243f;
  --glow:rgba(61,165,255,.55);
  --radius:16px; --radius-lg:22px;
  --maxw:880px;
  --ease:cubic-bezier(.2,.7,.2,1);
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  margin:0; background:var(--bg); color:var(--body);
  font-family:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  -webkit-font-smoothing:antialiased; line-height:1.6;
  overflow-x:hidden; position:relative; min-height:100vh;
}

/* ---------- Ambient aurora (фон, медленно дрейфует) ---------- */
.aurora{position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden}
.aurora::before, .aurora::after{
  content:""; position:absolute; border-radius:50%;
  filter:blur(80px); opacity:.5;
}
.aurora::before{
  width:680px; height:680px; left:50%; top:-180px; margin-left:-340px;
  background:radial-gradient(closest-side, rgba(61,165,255,.30), transparent 70%);
  animation:auroraA 18s ease-in-out infinite alternate;
}
.aurora::after{
  width:520px; height:520px; right:-160px; top:280px;
  background:radial-gradient(closest-side, rgba(124,196,255,.16), transparent 70%);
  animation:auroraB 22s ease-in-out infinite alternate;
}
/* тонкая верхняя «нить» бренда */
.topline{position:relative; z-index:2; height:2px;
  background:linear-gradient(90deg, transparent, var(--accent) 30%, var(--accent-light) 50%, var(--accent) 70%, transparent);
  background-size:200% 100%; animation:thread 5s linear infinite;}

.wrap{position:relative; z-index:2; max-width:var(--maxw); margin:0 auto; padding:0 20px 72px}

/* ---------- Topbar ---------- */
.topbar{
  display:flex; align-items:center; justify-content:space-between; gap:16px;
  padding:18px 0 6px;
}
.brand-mini{display:flex; align-items:center; gap:10px; font-family:"Space Grotesk"; font-weight:700; font-size:16px; letter-spacing:-.01em; color:var(--text)}
.brand-mini svg{width:24px; height:24px; display:block}
.langs{display:flex; gap:6px}
.langs button{
  font:inherit; font-family:"JetBrains Mono"; font-size:12px; font-weight:500; letter-spacing:.04em;
  cursor:pointer; color:var(--muted);
  background:var(--surface); border:1px solid var(--border); border-radius:9px;
  padding:7px 11px; transition:all .18s var(--ease);
}
.langs button:hover:not(.active){color:var(--text); border-color:var(--border-2); transform:translateY(-1px)}
.langs button.active{color:var(--accent); border-color:var(--accent); background:rgba(61,165,255,.10);
  box-shadow:0 0 0 3px rgba(61,165,255,.08)}

/* ---------- Hero: кристалл + заголовок ---------- */
.hero{text-align:center; padding:30px 0 22px}
.stage{
  position:relative; width:132px; height:132px; margin:0 auto 22px;
  perspective:600px;
  animation:floatY 5.5s ease-in-out infinite;
}
.stage .halo{
  position:absolute; inset:-30%; border-radius:50%; z-index:0; pointer-events:none;
  background:radial-gradient(closest-side, var(--glow), transparent 70%);
  filter:blur(10px); animation:halo 3.4s ease-in-out infinite;
}
.gem{
  position:relative; z-index:1; width:132px; height:132px; display:block;
  transform-style:preserve-3d; will-change:transform;
  transition:transform .25s var(--ease);
  animation:gemIn .9s var(--ease) both;
  filter:drop-shadow(0 14px 28px rgba(0,0,0,.5));
}
.gem .top{animation:twinkle 3.2s ease-in-out infinite}
/* световой свип по силуэту */
.sheen{
  position:absolute; inset:0; z-index:2; pointer-events:none; overflow:hidden;
  clip-path:polygon(28% 11%, 72% 11%, 91% 43%, 50% 88%, 9% 43%);
}
.sheen::before{
  content:""; position:absolute; top:-25%; left:0; width:55%; height:150%;
  background:linear-gradient(100deg, transparent, rgba(255,255,255,.6), transparent);
  transform:translateX(-220%) skewX(-16deg);
  animation:sweep 4.2s ease-in-out infinite; animation-delay:1.2s;
}
/* призма-лучи (тонкие, расходятся, едва заметны) */
.rays{position:absolute; inset:-40%; z-index:0; pointer-events:none; opacity:.5; animation:spin 26s linear infinite}
.rays span{position:absolute; left:50%; top:50%; width:1px; height:120px; transform-origin:top center;
  background:linear-gradient(180deg, rgba(124,196,255,.5), transparent);}
.spark{position:absolute; z-index:3; opacity:0; pointer-events:none;
  background:linear-gradient(180deg,#fff,#bfe3ff);
  clip-path:polygon(50% 0,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%);
  animation:spk 2.6s ease-in-out infinite;}
.spark.a{width:13px;height:13px; top:-4px; right:14px; animation-delay:.5s}
.spark.b{width:9px;height:9px; bottom:14px; left:8px; animation-delay:1.6s}
.spark.c{width:8px;height:8px; top:48px; right:-6px; animation-delay:2.3s}

.eyebrow{font-family:"JetBrains Mono"; font-size:11.5px; letter-spacing:.26em; text-transform:uppercase;
  color:var(--muted); font-weight:500; animation:rise .6s var(--ease) both .15s}
.h1{font-family:"Space Grotesk"; font-weight:700; font-size:clamp(34px,7vw,52px); letter-spacing:-.02em;
  margin:10px 0 0; color:var(--text); line-height:1.02;
  background:linear-gradient(180deg,#fff, #cfe4ff 130%);-webkit-background-clip:text; background-clip:text;
  animation:rise .6s var(--ease) both .24s}
.tagline{margin:12px auto 0; max-width:440px; font-size:15px; color:var(--muted);
  animation:rise .6s var(--ease) both .32s}

/* реквизиты самозанятого — «печать документа» */
.reqs{
  margin:20px auto 0; max-width:660px;
  display:flex; flex-wrap:nowrap; align-items:stretch; justify-content:center;
  font-family:"JetBrains Mono"; font-size:12.5px; color:var(--muted);
  background:linear-gradient(180deg,var(--surface),var(--surface-2));
  border:1px solid var(--border); border-radius:14px; overflow:hidden;
  box-shadow:inset 0 1px 0 rgba(124,196,255,.14);
  animation:rise .6s var(--ease) both .4s;
}
.reqs .cell{flex:1 1 auto; padding:11px 16px; display:flex; align-items:center; gap:7px; justify-content:center; white-space:nowrap}
.reqs .cell + .cell{border-left:1px solid var(--border)}
.reqs b{color:var(--text); font-weight:500}
.reqs .lab{color:var(--accent-light); font-weight:500}
.reqs a{color:var(--accent); text-decoration:none}
.reqs a:hover{text-decoration:underline}

/* ---------- Tabs (sticky, со скользящим индикатором) ---------- */
.tabsbar{
  position:sticky; top:0; z-index:20; margin:30px 0 18px;
  padding:8px 0; background:linear-gradient(180deg,var(--bg) 70%, transparent);
  -webkit-backdrop-filter:blur(8px); backdrop-filter:blur(8px);
}
.tabs{position:relative; display:flex; gap:4px; background:var(--surface);
  border:1px solid var(--border); border-radius:14px; padding:5px; overflow-x:auto; scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tabs button{
  position:relative; z-index:1; flex:1 0 auto; white-space:nowrap;
  font:inherit; font-weight:500; font-size:13.5px; cursor:pointer; color:var(--muted);
  background:transparent; border:0; border-radius:10px; padding:10px 16px;
  transition:color .2s var(--ease);
}
.tabs button:hover:not(.active){color:var(--text)}
.tabs button.active{color:var(--ink); font-weight:600}
.tab-pill{
  position:absolute; z-index:0; top:5px; bottom:5px; left:0; width:0;
  background:linear-gradient(180deg,var(--accent-light),var(--accent));
  border-radius:10px; box-shadow:0 6px 16px rgba(61,165,255,.4);
  transition:transform .35s var(--ease), width .35s var(--ease);
}

/* ---------- Документ ---------- */
.doc{
  background:linear-gradient(180deg,var(--surface),var(--surface-2));
  border:1px solid var(--border); border-radius:var(--radius-lg);
  padding:38px 40px; min-height:280px; position:relative;
  box-shadow:inset 0 1px 0 rgba(124,196,255,.18), 0 18px 50px rgba(0,0,0,.35);
}
.doc.swap{animation:swap .32s var(--ease)}
.state{color:var(--muted); text-align:center; padding:40px 0; font-family:"JetBrains Mono"; font-size:13px}

/* типографика тела документа */
.doc h1,.doc h2,.doc h3{font-family:"Space Grotesk"; color:var(--text); letter-spacing:-.01em; line-height:1.25}
.doc h1{font-size:26px; margin:0 0 6px}
.doc h2{font-size:19px; margin:30px 0 10px; padding-top:18px; border-top:1px solid var(--border)}
.doc h2:first-of-type{border-top:0; padding-top:0}
.doc h3{font-size:16px; margin:20px 0 8px; color:var(--accent-light)}
.doc p,.doc li{font-size:15px; color:var(--body)}
.doc ul,.doc ol{padding-left:22px}
.doc li{margin:5px 0}
.doc li::marker{color:var(--accent)}
.doc a{color:var(--accent); text-decoration:none; border-bottom:1px solid rgba(61,165,255,.35)}
.doc a:hover{border-bottom-color:var(--accent)}
.doc strong{color:var(--text); font-weight:600}
.doc code{font-family:"JetBrains Mono"; font-size:13px; background:rgba(61,165,255,.10);
  border:1px solid var(--border); border-radius:6px; padding:1px 6px; color:var(--accent-light)}
.doc blockquote{margin:16px 0; padding:12px 18px; border-left:3px solid var(--accent);
  background:rgba(61,165,255,.06); border-radius:0 10px 10px 0; color:var(--muted)}
.doc hr{border:0; border-top:1px solid var(--border); margin:24px 0}
.doc table{border-collapse:collapse; width:100%; margin:16px 0; font-size:14px}
.doc th,.doc td{border:1px solid var(--border); padding:10px 12px; text-align:left}
.doc th{background:rgba(61,165,255,.08); color:var(--text); font-weight:600; font-family:"Space Grotesk"}
.doc tr:nth-child(even) td{background:rgba(255,255,255,.015)}

/* scroll-reveal для заголовков внутри документа */
.doc :is(h2,h3){opacity:0; transform:translateY(8px); transition:opacity .5s var(--ease), transform .5s var(--ease)}
.doc :is(h2,h3).seen{opacity:1; transform:none}

/* ---------- Footer ---------- */
footer{
  position:relative; z-index:2; max-width:var(--maxw); margin:26px auto 0; padding:18px 20px 0;
  border-top:1px solid var(--border);
  display:flex; flex-wrap:wrap; gap:8px 18px; justify-content:space-between; align-items:center;
  font-family:"JetBrains Mono"; font-size:12px; color:var(--muted);
}
footer a{color:var(--accent); text-decoration:none}
footer a:hover{text-decoration:underline}
.updated{color:var(--muted)}

:focus-visible{outline:2px solid var(--accent); outline-offset:3px; border-radius:6px}

/* ---------- Keyframes ---------- */
@keyframes thread{to{background-position:200% 0}}
@keyframes auroraA{0%{transform:translate(-40px,-10px) scale(1)}100%{transform:translate(40px,30px) scale(1.15)}}
@keyframes auroraB{0%{transform:translate(30px,0) scale(1.05)}100%{transform:translate(-30px,-30px) scale(.9)}}
@keyframes floatY{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes halo{0%,100%{opacity:.45; transform:scale(.92)}50%{opacity:.85; transform:scale(1.1)}}
@keyframes gemIn{from{opacity:0; transform:scale(.7) rotateY(-25deg)}to{opacity:1; transform:none}}
@keyframes twinkle{0%,100%{fill-opacity:1}50%{fill-opacity:.7}}
@keyframes sweep{0%{transform:translateX(-220%) skewX(-16deg)}55%{transform:translateX(360%) skewX(-16deg)}100%{transform:translateX(360%) skewX(-16deg)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes spk{0%,100%{opacity:0; transform:scale(.2) rotate(0)}50%{opacity:.95; transform:scale(1) rotate(40deg)}}
@keyframes rise{from{opacity:0; transform:translateY(12px)}to{opacity:1; transform:none}}
@keyframes swap{from{opacity:0; transform:translateY(6px)}to{opacity:1; transform:none}}

/* ---------- Mobile ---------- */
@media (max-width:620px){
  .doc{padding:24px 20px}
  .reqs{flex-direction:column}
  .reqs .cell + .cell{border-left:0; border-top:1px solid var(--border)}
  .topbar{padding-top:14px}
  .stage{width:108px; height:108px}
  .gem{width:108px; height:108px}
}
@media (prefers-reduced-motion:reduce){
  *{animation:none !important; transition:none !important}
  .aurora,.rays,.sheen,.spark{display:none}
  .doc :is(h2,h3){opacity:1; transform:none}
  html{scroll-behavior:auto}
}
</style>
</head>
<body>
<div class="aurora" aria-hidden="true"></div>
<div class="topline" aria-hidden="true"></div>

<div class="wrap">

  <!-- Topbar -->
  <div class="topbar">

      <svg viewBox="0 0 100 100" aria-hidden="true">

<script>
/* ============================================================
   Боевая загрузка: документы берутся реальными .md из репозитория
   crystal-vpn-docs (DOCS ниже) через fetch() в load(). Тексты не вшиты.
   ============================================================ */
const ORDER = ['offer','privacy','partner','terms'];
const TAB_LABELS = {
  offer:{ru:'📜 Оферта',en:'📜 Offer',vi:'📜 Điều khoản'},
  privacy:{ru:'🔐 Конфиденциальность',en:'🔐 Privacy',vi:'🔐 Bảo mật'},
  partner:{ru:'🤝 Партнёрка',en:'🤝 Partners',vi:'🤝 Đối tác'},
  terms:{ru:'📋 Правила партнёрки',en:'📋 Partner rules',vi:'📋 Quy tắc'},
};
const UI = {
  ru:{eyebrow:'Официальные документы',self:'Самозанятый',sup:'Поддержка',updated:'Обновлено 17.07.2026',
      tagline:'Юридические документы сервиса — оферта, конфиденциальность и партнёрская программа.',
      loading:'Загрузка…',error:'Не удалось загрузить документ'},
  en:{eyebrow:'Official documents',self:'Self-employed',sup:'Support',updated:'Updated 2026-07-17',
      tagline:'Legal documents of the service — offer, privacy and partner program.',
      loading:'Loading…',error:'Failed to load document'},
  vi:{eyebrow:'Tài liệu chính thức',self:'Người tự kinh doanh',sup:'Hỗ trợ',updated:'Cập nhật 17.07.2026',
      tagline:'Tài liệu pháp lý của dịch vụ — điều khoản, bảo mật và chương trình đối tác.',
      loading:'Đang tải…',error:'Không tải được tài liệu'},
};

/* Реальные .md из репозитория crystal-vpn-docs (лежат рядом с index.html).
   Ключи вкладок → файлы: offer→OFFER, privacy→PRIVACY, partner→REFERRAL_PROGRAM,
   terms→TERMS_REFERRAL (×3 языка). Меняешь набор — правишь тут и в ORDER/TAB_LABELS. */
const DOCS = {
  offer:   {ru:'OFFER.md',            en:'OFFER_EN.md',            vi:'OFFER_VI.md'},
  privacy: {ru:'PRIVACY.md',          en:'PRIVACY_EN.md',          vi:'PRIVACY_VI.md'},
  partner: {ru:'REFERRAL_PROGRAM.md', en:'REFERRAL_PROGRAM_EN.md', vi:'REFERRAL_PROGRAM_VI.md'},
  terms:   {ru:'TERMS_REFERRAL.md',   en:'TERMS_REFERRAL_EN.md',   vi:'TERMS_REFERRAL_VI.md'},
};

const $ = id => document.getElementById(id);
let doc = (location.hash.replace('#','') in DOCS) ? location.hash.replace('#','') : 'offer';
let lang = (function(){
  const p = new URLSearchParams(location.search).get('lang');
  if(['ru','en','vi'].includes(p)){ try{localStorage.setItem('cvpn_lang',p)}catch(e){} return p; }
  let ls=null; try{ls=localStorage.getItem('cvpn_lang')}catch(e){}
  return ['ru','en','vi'].includes(ls)?ls:'ru';
})();

function syncLangInUrl(l){
  try{ const u=new URL(location.href);
    if(l==='ru') u.searchParams.delete('lang'); else u.searchParams.set('lang',l);
    history.replaceState(null,'',u.toString()); }catch(e){}
}

function renderTabs(){
  const host=$('tabs');
  [...host.querySelectorAll('button')].forEach(b=>b.remove());
  ORDER.forEach(key=>{
    const b=document.createElement('button');
    b.textContent=TAB_LABELS[key][lang];
    b.dataset.key=key;
    if(key===doc) b.classList.add('active');
    b.onclick=()=>{ if(doc===key)return; doc=key; location.hash=key; load(); };
    host.appendChild(b);
  });
  movePill();
}
function movePill(){
  const active=$('tabs').querySelector('button.active'); const pill=$('pill');
  if(!active||!pill) return;
  pill.style.width=active.offsetWidth+'px';
  pill.style.transform=`translateX(${active.offsetLeft}px)`;
}
function renderChrome(){
  document.documentElement.lang=lang;
  $('eyebrow').textContent=UI[lang].eyebrow;
  $('tagline').textContent=UI[lang].tagline;
  $('r-self').textContent=UI[lang].self;
  $('r-sup').textContent=UI[lang].sup;
  $('updated').textContent=UI[lang].updated;
  [...$('langs').children].forEach(b=>b.classList.toggle('active',b.dataset.lang===lang));
}

function revealHeadings(){
  const els=$('content').querySelectorAll('h2,h3');
  if(!('IntersectionObserver' in window)){ els.forEach(e=>e.classList.add('seen')); return; }
  const io=new IntersectionObserver((es)=>{
    es.forEach(e=>{ if(e.isIntersecting){ e.target.classList.add('seen'); io.unobserve(e.target);} });
  },{threshold:.1, rootMargin:'0px 0px -8% 0px'});
  els.forEach(e=>io.observe(e));
}

async function load(){
  renderTabs(); renderChrome();
  const box=$('content');
  box.innerHTML=`<div class="state">${UI[lang].loading}</div>`;
  try{
    const md = await (await fetch(DOCS[doc][lang], {cache:'no-cache'})).text();
    const html = (window.marked ? marked.parse(md) : md.replace(/\n/g,'<br>'));
    box.classList.remove('swap'); void box.offsetWidth; box.classList.add('swap');
    box.innerHTML = html;
    $('content').querySelectorAll('h1,h2,h3,h4,h5,h6').forEach(h=>h.id=h.textContent.toLowerCase().replace(/[^\p{L}\p{N}\s-]/gu,'').trim().replace(/\s/g,'-'));
    revealHeadings();
  }catch(e){
    box.innerHTML=`<div class="state">${UI[lang].error}</div>`;
  }
}

[...$('langs').children].forEach(b=>{
  b.onclick=()=>{ lang=b.dataset.lang; try{localStorage.setItem('cvpn_lang',lang)}catch(e){} syncLangInUrl(lang); load(); };
});
window.addEventListener('hashchange',()=>{
  const h=location.hash.replace('#','');
  if(h in DOCS && h!==doc){ doc=h; load(); }
});
window.addEventListener('resize', movePill);

/* parallax кристалла по курсору (тонкий 3D-наклон) */
(function(){
  const stage=$('stage'), gem=$('gem');
  if(!stage||!gem||window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
  if(window.matchMedia('(hover: none)').matches) return; // не на тач-устройствах
  stage.addEventListener('pointermove',(e)=>{
    const r=stage.getBoundingClientRect();
    const dx=(e.clientX-(r.left+r.width/2))/r.width;
    const dy=(e.clientY-(r.top+r.height/2))/r.height;
    gem.style.transform=`rotateY(${dx*22}deg) rotateX(${ -dy*22}deg)`;
  });
  stage.addEventListener('pointerleave',()=>{ gem.style.transform=''; });
})();

load();
</script>
